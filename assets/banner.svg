<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a5f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bgGrad)" rx="12"/>

  <!-- Subtle grid lines -->
  <g opacity="0.05" stroke="#fff" stroke-width="1">
    <line x1="0" y1="50" x2="900" y2="50"/>
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="150" x2="900" y2="150"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="800" y1="0" x2="800" y2="200"/>
  </g>

  <!-- Bluetooth icon (left side) -->
  <g transform="translate(55, 60)" filter="url(#glow)">
    <circle cx="30" cy="40" r="36" fill="none" stroke="#38bdf8" stroke-width="2" opacity="0.4"/>
    <circle cx="30" cy="40" r="28" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.25"/>
    <!-- Bluetooth symbol -->
    <polyline points="22,28 38,14 30,8 30,72 38,66 22,52" fill="none" stroke="#38bdf8" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Phone icon (right side decoration) -->
  <g transform="translate(790, 55)" opacity="0.3">
    <rect x="5" y="0" width="40" height="70" rx="6" fill="none" stroke="#818cf8" stroke-width="2.5"/>
    <line x1="5" y1="12" x2="45" y2="12" stroke="#818cf8" stroke-width="2"/>
    <line x1="5" y1="58" x2="45" y2="58" stroke="#818cf8" stroke-width="2"/>
    <circle cx="25" cy="65" r="4" fill="#818cf8"/>
  </g>

  <!-- Audio wave dots (decorative) -->
  <g opacity="0.2" fill="#38bdf8">
    <circle cx="120" cy="50" r="3"/>
    <circle cx="135" cy="40" r="3"/>
    <circle cx="150" cy="55" r="3"/>
    <circle cx="165" cy="35" r="3"/>
  </g>

  <!-- Main title -->
  <text x="450" y="88" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="58" font-weight="800" text-anchor="middle"
        fill="url(#textGrad)" filter="url(#glow)">CallScoot</text>

  <!-- Subtitle -->
  <text x="450" y="126" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="17" font-weight="400" text-anchor="middle"
        fill="#94a3b8" letter-spacing="1.5">
    Linux Bluetooth Call Deck for Android
  </text>

  <!-- Bottom tag line -->
  <text x="450" y="165" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="13" font-weight="300" text-anchor="middle"
        fill="#475569" letter-spacing="2">
    HFP · HSP · PipeWire · Echo Cancel · AI Agent
  </text>

  <!-- Bottom border accent -->
  <rect x="350" y="178" width="200" height="3" rx="2" fill="url(#textGrad)" opacity="0.7"/>
</svg>
